# asset-discovery master config
#
# Secrets (API keys, DB URLs) go in .env — never here.
# Only override values you want to change — everything has sensible defaults.
# Env vars override any value below.
#
# Resolution order per field: env var > this file > hardcoded default.

# ── Models ────────────────────────────────────────────────────────────────────
# Format: "provider/model" — supports bedrock/ and openai/ prefixes.
[models]
profile.enrich = "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"   # clean + refine stages
profile.research = "bedrock/us.anthropic.claude-opus-4-6-v1"             # research-from-scratch LLM
profile.web = "bedrock/us.anthropic.claude-sonnet-4-6"                # web search enrichment LLM
discover = "bedrock/us.anthropic.claude-opus-4-6-v1"
extract = "bedrock/us.anthropic.claude-opus-4-6-v1"
count = "bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0"
merge = "bedrock/us.anthropic.claude-sonnet-4-6"
qa = "bedrock/us.anthropic.claude-opus-4-6-v1"

# ── corp-profile ──────────────────────────────────────────────────────────────
# Pipeline modes (pick one):
#   enrich=true, web=false  → clean → LLM enrich → refine (no internet)
#   web=true                → clean → web search → refine (replaces enrich)
#   research=true           → build profile from scratch via LLM + web search
#
# Web search uses Exa for all Bedrock models. OpenAI models can use built-in
# search (provider="openai") or Exa (provider="exa").
[profile]
enrich = false                # Ignored when web=true (web replaces enrich)
web = true                    # Web search enrichment via Exa
web_provider = "exa"          # "exa" (explicit), "openai" (built-in), "auto" (exa for bedrock)
research = false              # Set true to build profile from scratch (ignores enrich/web)
research_provider = "exa"     # "exa", "openai", or "auto"

# ── web-scraper ───────────────────────────────────────────────────────────────
[scraper]
request_mode = "smart"        # smart | http | chrome
proxy_enabled = true
# default_proxy = ""          # residential | mobile | isp (empty = Spider default)
readability = false
filter_output_main_only = true
lite_mode = false
# max_credits_per_page = 0    # 0 = no limit
# max_credits_allowed = 0     # 0 = no limit

# ── doc-extractor ─────────────────────────────────────────────────────────────
[extractor]
max_batch_tokens = 120_000    # Increase for models with larger context windows

# ── rag ───────────────────────────────────────────────────────────────────────
# [rag]
# All defaults are fine for text-embedding-3-small + rerank-v3.5

# ── AWS ───────────────────────────────────────────────────────────────────────
[aws]
region = "us-east-2"

# ── Search (for discover stage, not corp-profile) ────────────────────────────
[search]
provider = "exa"              # exa | brave | tavily | openai

# ── Pipeline caps ─────────────────────────────────────────────────────────────
[pipeline]
page_stale_days = 30
max_discover_tool_calls = 200
max_discover_minutes = 15
max_qa_iterations = 2
max_urls_per_run = 5000
